<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CSV Analyst – HumanAgent Interface</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background-color: #f3f4f6; color: #1f2937; }
    h2 { color: #111827; }
    .layout { display: grid; grid-template-columns: 2fr 3fr; gap: 16px; max-width: 1200px; margin: 0 auto; }
    .card { background: white; border: 1px solid #e5e7eb; padding: 16px; border-radius: 8px; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); }
    h3 { margin-top: 0; margin-bottom: 12px; font-size: 1.1rem; color: #374151; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; }
    label { display: block; font-weight: 500; margin-bottom: 4px; color: #4b5563; font-size: 0.9rem;}
    textarea { width: 100%; height: 100px; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; font-family: monospace; box-sizing: border-box; resize: vertical; }
    pre { background: #f9fafb; padding: 12px; border: 1px solid #e5e7eb; border-radius: 4px; max-height: 250px; overflow: auto; font-size: 0.85rem; margin-top: 0; }
    .btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    button { padding: 8px 16px; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; transition: background-color 0.2s; }
    .btn-primary { background-color: #3b82f6; color: white; }
    .btn-primary:hover { background-color: #2563eb; }
    .btn-secondary { background-color: #e5e7eb; color: #374151; }
    .btn-secondary:hover { background-color: #d1d5db; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px;}
    .badge-gray { background-color: #e5e7eb; color: #374151; }
  </style>
</head>
<body>
  <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h2>CSV Analyst Interface</h2>
    <div style="display: flex; gap: 16px; align-items: center;">
      <select id="task-selector" onchange="resetWithSelectedTask()" style="padding: 8px; border-radius: 6px; border: 1px solid #d1d5db;">
        <option value="">Random Task</option>
        <option value="q1">q1: Delivered orders in South (Easy)</option>
        <option value="q2">q2: Category with highest quantity (Medium)</option>
        <option value="q3">q3: Avg price for Clothing (Medium)</option>
        <option value="q4">q4: Region with most cancelled (Easy)</option>
        <option value="q5">q5: Discount > 0.10 (Medium)</option>
        <option value="q6">q6: Top customer by unit price (Hard)</option>
        <option value="q13">q13: Unique customers count (Hard)</option>
      </select>
      <a href="/" style="color: #3b82f6; text-decoration: none; font-weight: 500;">&larr; Back to Landing Page</a>
    </div>
  </div>

  <div class="layout">
    <div>
      <div class="card">
        <h3>Take Action</h3>
        <label>Action JSON:</label>
        <textarea id="action-input">{
  "action_type": "list_columns"
}</textarea>
        <div class="btn-group">
          <button class="btn-primary" onclick="stepEnv()" id="step-btn">Execute Step</button>
        </div>
        <div class="btn-group" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e5e7eb;">
          <button class="btn-secondary" onclick="resetEnv()">Reset (New Random)</button>
          <button class="btn-secondary" onclick="getState()">Refresh State</button>
        </div>
      </div>

      <div class="card" style="margin-top:16px;">
        <h3>Current State Summary</h3>
        <div id="state-summary" style="font-size: 0.9rem; margin-bottom: 12px;"></div>
        <pre id="state-box">No state yet. Click 'Reset Environment' to start.</pre>
      </div>
    </div>

    <div>
      <div class="card">
        <h3>Current Observation</h3>
        <pre id="obs-box">No observation yet.</pre>
      </div>
      <div class="card" style="margin-top:16px;">
        <h3>Action History</h3>
        <pre id="history-box">No actions taken yet.</pre>
      </div>
    </div>
  </div>

  <script>
    let currentQuestion = "No question found. Click reset.";

    function renderState(state, observation) {
      if (state) {
        document.getElementById("state-box").textContent = JSON.stringify(state, null, 2);
        
        if (observation && observation.question) {
          currentQuestion = observation.question;
        }

        const summaryHtml = `
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <span class="badge badge-gray">Step: ${state.step_count || 0}/${state.max_steps || '8'}</span>
            <span class="badge badge-gray">Task: ${state.question_id || 'N/A'}</span>
          </div>
          <div style="margin-top: 8px; font-weight: 600; color: #111827;">
            ${currentQuestion}
          </div>
        `;
        document.getElementById("state-summary").innerHTML = summaryHtml;
        
        // Enable step button if not done
        const isDone = state.done || (state.step_count >= state.max_steps) || !!state.submitted_answer;
        document.getElementById("step-btn").disabled = isDone;
        if (isDone) {
          document.getElementById("step-btn").style.opacity = "0.5";
          document.getElementById("step-btn").style.cursor = "not-allowed";
        } else {
          document.getElementById("step-btn").style.opacity = "1";
          document.getElementById("step-btn").style.cursor = "pointer";
        }
      }
      
      if (observation) {
        document.getElementById("obs-box").textContent = JSON.stringify(observation, null, 2);
      }
    }

    async function resetWithSelectedTask() {
      const taskId = document.getElementById("task-selector").value;
      await resetEnv(taskId);
    }

    async function resetEnv(taskId) {
      document.getElementById("history-box").textContent = "No actions taken yet.";
      const body = taskId ? { task_id: taskId } : {};
      
      try {
        const res = await fetch("/reset", { 
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body) 
        });
        const obs = await res.json();
        
        const stateRes = await fetch("/state");
        const state = await stateRes.json();
        
        renderState(state, obs);
      } catch (e) {
        alert("Error resetting environment: " + e);
      }
    }

    function renderStep(obs, action) {
      const historyBox = document.getElementById("history-box");
      const line = {
        action,
        reward: obs.reward,
        done: obs.done,
        message: obs.message
      };
      
      const isFirst = historyBox.textContent === "No actions taken yet.";
      const newEntry = JSON.stringify(line, null, 2);
      historyBox.textContent = (isFirst ? "" : historyBox.textContent + "\n\n") + newEntry;
      historyBox.scrollTop = historyBox.scrollHeight;
    }

    async function stepEnv() {
      const raw = document.getElementById("action-input").value;
      let action;
      try { 
        action = JSON.parse(raw); 
      } catch (e) { 
        alert("Invalid JSON format in action input:\n" + e.message); 
        return; 
      }

      try {
        const res = await fetch("/step", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(action)
        });
        
        const obs = await res.json();
        if (!res.ok) {
           alert("API Error: " + JSON.stringify(obs));
           return;
        }
        
        renderStep(obs, action);
        
        // Always fetch latest state after a step
        const stateRes = await fetch("/state");
        const state = await stateRes.json();
        renderState(state, obs);
        
      } catch (e) {
        alert("Network error executing step: " + e);
      }
    }

    async function getState() {
      try {
        const res = await fetch("/state");
        if (!res.ok) {
            document.getElementById("state-box").textContent = "Environment not initialized. Call reset first.";
            return;
        }
        const state = await res.json();
        renderState(state, null);
      } catch (e) {
        document.getElementById("state-box").textContent = "Failed to fetch state: " + e;
      }
    }
    
    getState();
  </script>
</body>
</html>
